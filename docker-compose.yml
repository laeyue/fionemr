version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: fiona-backend
    restart: always
    environment:
      - PORT=5000
      # If using Supabase, populate these values in your environment or a root .env file.
      # Otherwise, the backend will automatically fallback to the local in-memory store.
      - SUPABASE_URL=${SUPABASE_URL:-}
      - SUPABASE_KEY=${SUPABASE_KEY:-}
      - JWT_SECRET=${JWT_SECRET:-your-fallback-jwt-secret-key-123}
      # Brevo and SMTP configuration overrides
      - BREVO_API_KEY=${BREVO_API_KEY:-}
      - SMTP_USER=${SMTP_USER:-}
      - SMTP_PASS=${SMTP_PASS:-}
      - SENDER_EMAIL=${SENDER_EMAIL:-}
      - SENDER_NAME=${SENDER_NAME:-}
      - BACKEND_URL=${BACKEND_URL:-}
    ports:
      - "5000:5000"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - VITE_API_URL=/api
    container_name: fiona-frontend
    restart: always
    ports:
      - "3000:80"
    depends_on:
      - backend
